<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkdDev</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">

    <div class="header">
        <div class="wordmark">
            <div class="wordmark-dot"></div>
            <h1>LinkdDev</h1>
        </div>
        <p class="subtitle">Your portfolio engine is running and ready to connect.</p>
    </div>

    <div class="card">
        <div class="status-main">
            <div class="status-icon">
                <div class="status-ring"></div>
                <div class="status-dot-lg"></div>
            </div>
            <div class="status-text">
                <h2>Server is running</h2>
                <p>All systems operational. No action needed.</p>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                Operational
            </div>
        </div>

        <div class="status-row">
            <div class="meta-item">
                <span class="meta-label">Environment</span>
                <span class="meta-value">development</span>
            </div>
            <div class="meta-item">
                <span class="meta-label">Auth routes</span>
                <span class="meta-value">/auth/github</span>
            </div>
            <div class="meta-item">
                <span class="meta-label">Version</span>
                <span class="meta-value">v1.0.0</span>
            </div>
        </div>
    </div>

    <div class="footer">
        <span class="footer-left">LinkdDev@v1.0.0</span>
        <span class="footer-right">Built for developers</span>
    </div>

</div>

</body>
</html>
